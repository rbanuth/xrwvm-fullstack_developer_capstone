<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Car Dealership</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            width: 100%;
            height: 400px;
            background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .hero h1 {
            font-size: 48px;
            background: rgba(0,0,0,0.5);
            padding: 15px 30px;
            border-radius: 8px;
        }

        /* CONTAINER */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }

        /* CONTACT INFO */
        .contact-info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .info-box {
            background: white;
            padding: 20px;
            width: 30%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-box h3 {
            margin-bottom: 10px;
            color: #333;
        }

        /* FORM */
        .contact-form {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .contact-form h2 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .form-group textarea {
            resize: none;
            height: 120px;
        }

        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #45a049;
        }

        /* MAP */
        .map {
            margin-top: 40px;
        }

        iframe {
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 8px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .info-box {
                width: 100%;
            }

            .hero h1 {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>

    <!-- HERO IMAGE -->
    <div class="hero">
        <h1>Contact bestcar Dealership</h1>
    </div>

    <div class="container">

        <!-- CONTACT INFO -->
        <div class="contact-info">
            <div class="info-box">
                <h3>📍 Address</h3>
                <p>123 Auto Drive<br>Westborough, MA 01581<br>USA</p>
            </div>

            <div class="info-box">
                <h3>📞 Phone</h3>
                <p>+1 (555) 123-4567</p>
                <p>+1 (555) 987-6543</p>
            </div>

            <div class="info-box">
                <h3>📧 Email</h3>
                <p>sales@bestcardealership.com</p>
                <p>support@bestcardealership.com</p>
            </div>
        </div>

        <!-- CONTACT FORM -->

            <h2>Send Us a Message</h2>

                <div class="form-group">
                    <label>Name</label>

                </div>

                </div>

                <div class="form-group">

                <div class="form-group">
                    <label>Message</label>
                    <textarea placeholder="Write your message here..." required></textarea>
                </div>

                <button class="btn" type="submit">Submit</button>
            </form>
        </div> -->

        <!-- MAP -->
        <div class="map">
            <h2>Our Location</h2>
            <iframe 
                src="https://maps.google.com/maps?q=Westborough%20MA&t=&z=13&ie=UTF8&iwloc=&output=embed">
            </iframe>
        </div>

    </div>

</body>
</html>
